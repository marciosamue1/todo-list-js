<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./assets/css/style.css">
    <title>desafios - hábitos</title>


</head>

<body>

    <div id="container" class="container d-flex flex-column align-items-center justify-content-center">


        <div id="conteudo" class="d-flex flex-column align-items-center justify-content-center bg-primary p-5 rounded-4 shadow-lg">



            <section id="textos" class="d-flex flex-column align-items-center justify-content-center mb-4">
                <h1 class="text-center text-white">Desafios - Hábitos</h1>

            </section>

            <form action="" id="submit" class="input-group flex-nowrap">
                <label for="tarefa" class="input-group-text">Tarefa:</label>
                <input type="text" id="display" placeholder="Digite sua tarefa aqui..." name="tarefa" class="form-control">
                <button id="enviar" class="btn btn-outline-dark" type="submit">Adicionar</button>
            </form>


            <section id="info" class="d-flex flex-column align-items-center justify-content-center p-4 ">

                <ul id="filtros" class="nav nav-pills mb-3 d-flex justify-content-between p-1" >    
                    <li class="nav-item">
                        <button id="filtro-todos" class="btn btn-outline-light m-1" type="button">Todos</button>
                    </li>

                    <li class="nav-item">
                        <button id="filtro-pendentes" class="btn btn-outline-light m-1 " type="button">Pendentes</button>
                    </li>

                    <li class="nav-item" >
                        <button id="filtro-concluidas" class="btn btn-outline-light m-1" type="button">Concluídas</button>
                    </li>
                </ul>


                <section id="tarefas">
                    <ul id="lista-tarefas" class="">

                    </ul>
                </section>


            </section>

        </div>

    </div>


    <script src="./assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
